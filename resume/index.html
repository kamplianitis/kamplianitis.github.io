<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Konstantinos Amplianitis — Resume</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f5f7fb;
      --fg: #111827;
      --muted: #6b7280;
      --card: #ffffff;
      --border: #d1d5db;
      --primary: #111827;
      --primary-fg: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1020;
        --fg: #f3f4f6;
        --muted: #9ca3af;
        --card: #111827;
        --border: #374151;
        --primary: #f3f4f6;
        --primary-fg: #111827;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .title h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    .title p {
      margin: 6px 0 0;
      color: var(--muted);
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      border: 1px solid var(--border);
      color: var(--fg);
      background: var(--card);
      font-weight: 600;
    }
    .btn.primary {
      background: var(--primary);
      color: var(--primary-fg);
      border-color: var(--primary);
    }
    .viewer {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      height: calc(100vh - 150px);
      min-height: 700px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Konstantinos Amplianitis — Resume</h1>
        <p>Preview the latest released CV online or download the PDF.</p>
      </div>
      <div class="actions">
        <a class="btn primary" href="./Amplianitis_Konstantinos_CV.pdf" target="_blank" rel="noopener noreferrer">Open PDF</a>
        <a class="btn" href="./Amplianitis_Konstantinos_CV.pdf" download="Amplianitis_Konstantinos_CV.pdf">Download PDF</a>
      </div>
    </div>

    <div class="viewer">
      <iframe src="./Amplianitis_Konstantinos_CV.pdf"></iframe>
    </div>
  </div>
</body>
</html>
